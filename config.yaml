# Default configuration for Boat Random Walk Simulator
# This file contains all adjustable parameters for the simulation

# Physical simulation parameters
simulation:
  pool_width: 12.5          # meters - width of the simulation area
  pool_height: 25.0         # meters - length of the simulation area
  cruise_speed: 0.2         # m/s - boat speed in open water
  sample_interval: 10.0     # minutes - time between water samples
  max_samples: 12           # maximum number of samples to collect
  
# Physics and movement parameters
physics:
  alpha: 45.0               # degrees - initial heading angle
  min_delta: 25.0           # degrees - minimum random angle change
  max_delta: 45.0           # degrees - maximum random angle change
  slowdown_factor: 0.5      # ratio - speed reduction near edges
  edge_buffer: 0.5          # meters - distance from edge to start slowing
  turn_delay: 1.5           # seconds - time to execute a turn
  time_step: 0.1            # seconds - simulation time step

# Statistical analysis parameters
analysis:
  grid_resolution: 20       # cells per width for coverage analysis
  knn_k: 1                  # K value for nearest neighbor analysis
  confidence_level: 0.95    # statistical confidence level

# Visualization parameters
visualization:
  figure_width: 12          # inches
  figure_height: 8          # inches
  dpi: 300                  # dots per inch for saved figures
  animation_interval: 100   # milliseconds between animation frames
  path_alpha: 0.7           # transparency of path line
  sample_size: 100          # size of sample point markers

# Export parameters
export:
  csv_precision: 6          # decimal places in CSV output
  include_metadata: true    # include run parameters in exports
  timestamp_format: "%Y%m%d_%H%M%S"  # format for file timestamps

# Development and debugging
debug:
  verbose_logging: false    # enable detailed console output
  save_intermediate: false  # save intermediate calculation steps
  plot_every_step: false    # create plot for each simulation step
  random_seed: null         # set to integer for reproducible results
